name: Practice Ci

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: get repo
              uses: actions/checkout@v4

            - name: setup nodejs
              uses: actions/setup-node@v4
              with:
                node-version: 22
            
            - name: install dependency
              run: npm ci

            - name: build code
              run: npm run build
